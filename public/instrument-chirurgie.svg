<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Chirurgische Dental-Schere, Nahaufnahme">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#f4f6f8"/>
      <stop offset="60%" stop-color="#e7eaee"/>
      <stop offset="100%" stop-color="#d8dde3"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fb"/>
      <stop offset="20%" stop-color="#d0d7de"/>
      <stop offset="50%" stop-color="#9aa5b1"/>
      <stop offset="80%" stop-color="#c6cdd5"/>
      <stop offset="100%" stop-color="#7c8894"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="45%" stop-color="#cbd3db"/>
      <stop offset="100%" stop-color="#8b95a1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5b6470" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>

  <g filter="url(#soft)" transform="translate(450,260) rotate(-4)">
    <!-- lower blade + shank -->
    <path d="M-250 8 C -140 -6 -30 -8 70 6 C 150 18 210 40 262 70"
          fill="none" stroke="url(#blade)" stroke-width="16" stroke-linecap="round"/>
    <!-- upper blade + shank -->
    <path d="M-250 -8 C -140 6 -30 8 70 -6 C 150 -18 210 -40 262 -70"
          fill="none" stroke="url(#blade)" stroke-width="16" stroke-linecap="round"/>

    <!-- pivot screw -->
    <circle cx="70" cy="0" r="16" fill="url(#steel)" stroke="#7f8a96" stroke-width="2"/>
    <circle cx="70" cy="0" r="4.5" fill="#6b7580"/>

    <!-- lower shank to finger ring -->
    <path d="M-250 8 C -300 12 -336 26 -352 52"
          fill="none" stroke="url(#steel)" stroke-width="15" stroke-linecap="round"/>
    <circle cx="-372" cy="86" r="34" fill="none" stroke="url(#steel)" stroke-width="15"/>

    <!-- upper shank to finger ring -->
    <path d="M-250 -8 C -300 -12 -336 -26 -352 -52"
          fill="none" stroke="url(#steel)" stroke-width="15" stroke-linecap="round"/>
    <circle cx="-372" cy="-86" r="34" fill="none" stroke="url(#steel)" stroke-width="15"/>

    <!-- pointed blade tips -->
    <path d="M262 70 l 20 14" stroke="url(#blade)" stroke-width="6" stroke-linecap="round"/>
    <path d="M262 -70 l 20 -14" stroke="url(#blade)" stroke-width="6" stroke-linecap="round"/>

    <!-- highlight -->
    <path d="M-240 -8 C -140 6 -30 8 60 -4" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>
