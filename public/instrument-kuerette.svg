<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Dental-Kürette, doppelendig, Nahaufnahme">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#f4f6f8"/>
      <stop offset="60%" stop-color="#e7eaee"/>
      <stop offset="100%" stop-color="#d8dde3"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fb"/>
      <stop offset="18%" stop-color="#cfd6dd"/>
      <stop offset="50%" stop-color="#9aa5b1"/>
      <stop offset="82%" stop-color="#c6cdd5"/>
      <stop offset="100%" stop-color="#7c8894"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="22%" stop-color="#d4dbe2"/>
      <stop offset="50%" stop-color="#aab4bf"/>
      <stop offset="78%" stop-color="#cad2da"/>
      <stop offset="100%" stop-color="#8b95a1"/>
    </linearGradient>
    <linearGradient id="tip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f5"/>
      <stop offset="50%" stop-color="#b9c2cb"/>
      <stop offset="100%" stop-color="#828d99"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fa8ff"/>
      <stop offset="50%" stop-color="#2f7ff0"/>
      <stop offset="100%" stop-color="#1a5fc4"/>
    </linearGradient>
    <radialGradient id="toe" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f2f5f8"/>
      <stop offset="60%" stop-color="#c2cbd4"/>
      <stop offset="100%" stop-color="#8a95a1"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5b6470" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>

  <g filter="url(#soft)" transform="translate(450,262) rotate(-9)">
    <rect x="-150" y="-26" width="300" height="52" rx="26" fill="url(#handle)"/>
    <g stroke="#7f8a96" stroke-width="2" opacity="0.55">
      <line x1="-120" y1="-24" x2="-134" y2="24"/>
      <line x1="-96" y1="-24" x2="-110" y2="24"/>
      <line x1="-72" y1="-24" x2="-86" y2="24"/>
      <line x1="-48" y1="-24" x2="-62" y2="24"/>
      <line x1="-24" y1="-24" x2="-38" y2="24"/>
      <line x1="0" y1="-24" x2="-14" y2="24"/>
      <line x1="24" y1="-24" x2="10" y2="24"/>
      <line x1="48" y1="-24" x2="34" y2="24"/>
      <line x1="72" y1="-24" x2="58" y2="24"/>
      <line x1="96" y1="-24" x2="82" y2="24"/>
      <line x1="120" y1="-24" x2="106" y2="24"/>
    </g>
    <rect x="-150" y="-26" width="300" height="16" rx="8" fill="#ffffff" opacity="0.35"/>

    <rect x="-172" y="-22" width="26" height="44" rx="12" fill="url(#ring)"/>
    <rect x="146" y="-22" width="26" height="44" rx="12" fill="url(#ring)"/>

    <!-- left shank + rounded curette blade -->
    <path d="M-172 -6 C -228 -12 -270 -14 -308 -6 C -338 0 -356 14 -366 30"
          fill="none" stroke="url(#steel)" stroke-width="15" stroke-linecap="round"/>
    <path d="M-366 30 C -374 42 -378 56 -374 68"
          fill="none" stroke="url(#tip)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-376" cy="72" r="12" fill="url(#toe)"/>

    <!-- right shank + rounded curette blade -->
    <path d="M172 6 C 228 12 270 14 308 6 C 338 0 356 -14 366 -30"
          fill="none" stroke="url(#steel)" stroke-width="15" stroke-linecap="round"/>
    <path d="M366 -30 C 374 -42 378 -56 374 -68"
          fill="none" stroke="url(#tip)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="376" cy="-72" r="12" fill="url(#toe)"/>
  </g>
</svg>
